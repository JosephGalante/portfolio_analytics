x-backend-env: &backend-env
  APP_NAME: ${APP_NAME:-Portfolio Analytics}
  APP_VERSION: ${APP_VERSION:-0.1.0}
  APP_ENV: ${APP_ENV:-local}
  APP_HOST: ${APP_HOST:-0.0.0.0}
  APP_PORT: ${APP_PORT:-8000}
  APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-["http://localhost:3000"]}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://portfolio:portfolio@postgres:5432/portfolio_analytics}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  RUN_DB_MIGRATIONS_ON_START: ${RUN_DB_MIGRATIONS_ON_START:-true}
  RUN_EMBEDDED_WORKERS: ${RUN_EMBEDDED_WORKERS:-false}
  GUEST_DEMO_MODE: ${GUEST_DEMO_MODE:-false}
  GUEST_DEMO_RESET_ON_START: ${GUEST_DEMO_RESET_ON_START:-false}
  GUEST_DEMO_TOKEN_SECRET: ${GUEST_DEMO_TOKEN_SECRET:-local-demo-secret-change-me}
  GUEST_DEMO_SESSION_TTL_MINUTES: ${GUEST_DEMO_SESSION_TTL_MINUTES:-120}
  GUEST_DEMO_USER_EMAIL: ${GUEST_DEMO_USER_EMAIL:-guest-demo@portfolio-analytics.local}
  GUEST_DEMO_USER_NAME: ${GUEST_DEMO_USER_NAME:-Guest Demo}
  STYTCH_PROJECT_ID: ${STYTCH_PROJECT_ID:-}
  STYTCH_SECRET: ${STYTCH_SECRET:-}
  STYTCH_API_URL: ${STYTCH_API_URL:-https://test.stytch.com/v1}
  FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
  FINNHUB_API_URL: ${FINNHUB_API_URL:-https://finnhub.io/api/v1}
  MARKET_DATA_POLL_INTERVAL_MS: ${MARKET_DATA_POLL_INTERVAL_MS:-15000}
  MARKET_DATA_REQUEST_TIMEOUT_SECONDS: ${MARKET_DATA_REQUEST_TIMEOUT_SECONDS:-10}
  SEEDED_USER_EMAIL: ${SEEDED_USER_EMAIL:-demo@example.com}
  SEEDED_USER_NAME: ${SEEDED_USER_NAME:-Demo User}

x-frontend-env: &frontend-env
  NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
  NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:8000}
  NEXT_PUBLIC_GUEST_DEMO_MODE: ${NEXT_PUBLIC_GUEST_DEMO_MODE:-false}
  NEXT_PUBLIC_STYTCH_PUBLIC_TOKEN: ${NEXT_PUBLIC_STYTCH_PUBLIC_TOKEN:-}
  NEXT_PUBLIC_STYTCH_LOGIN_REDIRECT_URL: ${NEXT_PUBLIC_STYTCH_LOGIN_REDIRECT_URL:-http://localhost:3000}
  NEXT_PUBLIC_STYTCH_PASSWORD_RESET_REDIRECT_URL: ${NEXT_PUBLIC_STYTCH_PASSWORD_RESET_REDIRECT_URL:-http://localhost:3000/authenticate}

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio} -d ${POSTGRES_DB:-portfolio_analytics}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8000}:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "app.workers.valuation_worker"]

  market-data:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "app.workers.market_data_poller"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      <<: *frontend-env
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "1000"
    depends_on:
      api:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next-cache:/app/.next
    command:
      [
        "sh",
        "-c",
        "if [ ! -x node_modules/.bin/next ]; then npm ci; fi; npm run dev"
      ]

volumes:
  postgres-data:
  redis-data:
  frontend-node-modules:
  frontend-next-cache:
